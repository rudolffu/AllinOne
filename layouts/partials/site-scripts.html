<!-- jQuery -->
<script defer src="{{ "js/vendors/jquery/jquery-3.7.1.min.js" | absURL }}"></script>

<!-- MDB Standard (includes Bootstrap 5 + MDB) -->
<script defer src="{{ "js/vendors/mdb-ui-kit/mdb.umd.min.js" | absURL }}"></script>

<!-- Other Vendors -->
<script defer src="{{ "js/vendors/holder.min.js" | absURL }}"></script>

<!-- Smooth Scroll (standalone, jQuery-based) -->
<script defer src="{{ "js/vendors/jquery/jquery.smooth-scroll.min.js" | absURL }}"></script>

<!-- Main Script -->
<script defer src="{{ "js/main.js" | absURL }}"></script>

<!-- Highlight -->
{{ if .Site.Params.highlightjs }}  
  <script defer src="{{ "js/vendors/highlight.pack.js" | absURL }}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      hljs.highlightAll();
    });
  </script>
{{ end }}

<!-- KaTeX -->
{{ if .Site.Params.katex }} 
  <script defer src="{{ "js/vendors/katex/katex.min.js" | absURL }}"></script>
  <script defer src="{{ "js/vendors/katex/contrib/auto-render.min.js" | absURL }}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      renderMathInElement(document.body);
    });
  </script>
{{ end }}

<!-- MDB Initialization -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    // Initialize animations (replaces WOW.js)
    document.querySelectorAll('.wow').forEach(function (el) {
      el.classList.add('animate__animated');
      if (!el.classList.contains('animate__fadeIn')) {
        el.classList.add('animate__fadeIn');
      }
    });
  });
</script>
