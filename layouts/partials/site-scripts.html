<!-- jQuery -->
<script defer src="{{ "js/vendors/jquery/jquery-3.7.1.min.js" | absURL }}"></script>
<script defer src="{{ "js/vendors/jquery/jquery.smooth-scroll.min.js" | absURL }}"></script>

<!-- Bootstrap 5 Bundle (includes Popper) -->
<script defer src="{{ "js/vendors/bootstrap5/bootstrap.bundle.min.js" | absURL }}"></script>

<!-- Other Vendors -->
<script defer src="{{ "js/vendors/holder.min.js" | absURL }}"></script>
<script defer src="{{ "js/vendors/wow.min.js" | absURL }}"></script>

<!-- Main Script -->
<script defer src="{{ "js/main.js" | absURL }}"></script>

<!-- Highlight -->
{{ if .Site.Params.highlightjs }}  
  <script defer src="{{ "js/vendors/highlight.pack.js" | absURL }}"></script>
  <script>hljs.highlightAll();</script>
{{ end }}

<!-- KaTeX -->
{{ if .Site.Params.katex }} 
  <script defer src="{{ "js/vendors/katex/katex.min.js" | absURL }}"></script>
  <script defer src="{{ "js/vendors/katex/contrib/auto-render.min.js" | absURL }}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      renderMathInElement(document.body);
    });
  </script>
{{ end }}

<!-- Animations -->
<script>
  new WOW().init();
</script>

<!-- Scrolling navbar (replaces MDB) -->
<script>
  var navbar = document.querySelector('.scrolling-navbar');
  if (navbar) {
    window.addEventListener('scroll', function () {
      if (window.pageYOffset > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });
  }
</script>
