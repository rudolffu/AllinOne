<!-- Code block copy buttons -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    function copyCodeText(text) {
      function fallbackCopy() {
        var textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.setAttribute("readonly", "");
        textArea.style.position = "absolute";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.select();

        return new Promise(function (resolve, reject) {
          try {
            document.execCommand("copy") ? resolve() : reject();
          } catch (error) {
            reject(error);
          } finally {
            document.body.removeChild(textArea);
          }
        });
      }

      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text).catch(fallbackCopy);
      }

      return fallbackCopy();
    }

    document.querySelectorAll(".markdown pre").forEach(function (pre) {
      var code = pre.querySelector("code");
      if (!code || pre.querySelector(".copy-code-button")) {
        return;
      }

      var button = document.createElement("button");
      button.type = "button";
      button.className = "copy-code-button";
      button.setAttribute("aria-label", "Copy code");
      button.textContent = "Copy";

      button.addEventListener("click", function (event) {
        event.preventDefault();
        event.stopPropagation();

        copyCodeText(code.innerText).then(function () {
          button.textContent = "Copied";
          button.classList.add("copied");
          window.setTimeout(function () {
            button.textContent = "Copy";
            button.classList.remove("copied");
          }, 1400);
        }).catch(function () {
          button.textContent = "Failed";
          window.setTimeout(function () {
            button.textContent = "Copy";
          }, 1400);
        });
      });

      pre.appendChild(button);
    });
  });
</script>

<!-- Highlight -->
{{ if .Site.Params.highlightjs }}  
  <script defer src="{{ "js/vendors/highlight.pack.js" | absURL }}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.hljs) {
        document.querySelectorAll("pre code").forEach(function (code) {
          if (!code.closest(".highlight")) {
            hljs.highlightElement(code);
          }
        });
      }
    });
  </script>
{{ end }}

<!-- KaTeX -->
{{ if .Site.Params.katex }} 
  <script defer src="{{ "js/vendors/katex/katex.min.js" | absURL }}"></script>
  <script defer src="{{ "js/vendors/katex/contrib/auto-render.min.js" | absURL }}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      renderMathInElement(document.body);
    });
  </script>
{{ end }}
