<!DOCTYPE html>
<html lang="{{ $.Site.Language.Lang | default "zh-Hans" }}">
  {{ partial "head.html" . }}
  <body class="bg-light" data-bs-spy="scroll" data-bs-target="#page-scrollspy" data-bs-offset="90">
    {{ block "header" . }}
      {{ partial "site-navbar.html" . }} 
      {{ partial "page-header.html" . }}  
    {{ end }}

    {{ block "main" . }}
      <!-- Page-specific content goes here -->
    {{ end }}
    
    {{ partial "footer.html" . }}
    {{ partial "site-scripts.html" . }}
  </body>
</html>
